<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #FAF7F1; }
    ::selection { background: #C8973A; color: #fff; }
    a { color: #1A3A5C; }
    a:hover { color: #C8973A; }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-thumb { background: #D8CDB8; border-radius: 10px; }
  </style>
</helmet>

<div style="display:flex; min-height:100vh; font-family:'Public Sans',sans-serif; background:#FAF7F1; color:#1A3A5C;">

  <!-- Sidebar -->
  <div style="width:248px; flex-shrink:0; background:#1A3A5C; display:flex; flex-direction:column; padding:28px 20px; box-sizing:border-box;">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:36px; padding:0 4px;">
      <div style="width:36px; height:36px; border-radius:50%; background:#C8973A; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <div style="width:14px; height:14px; border:2px solid #1A3A5C; border-radius:50%;"></div>
      </div>
      <div>
        <div style="font-family:'Lora',serif; font-weight:600; font-size:16px; color:#FAF7F1; line-height:1.2;">Grace Chapel</div>
        <div style="font-size:11px; color:#B9C4CF; letter-spacing:0.04em; text-transform:uppercase;">Staff Directory</div>
      </div>
    </div>

    <div style="font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#7C8FA0; margin:0 0 10px 12px;">Directory</div>
    <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="2">
      <div style="{{ item.style }}">
        <div style="width:18px; height:18px; border-radius:{{ item.iconRadius }}; border:2px solid {{ item.iconColor }}; flex-shrink:0;"></div>
        <div style="font-size:14.5px; font-weight:{{ item.weight }};">{{ item.label }}</div>
      </div>
    </sc-for>

    <div style="margin-top:auto; padding-top:20px; border-top:1px solid rgba(255,255,255,0.12);">
      <div style="display:flex; align-items:center; gap:10px; padding:9px 12px;">
        <div style="width:28px; height:28px; border-radius:50%; background:#2E4E6E; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#EFD9AE; flex-shrink:0;">RM</div>
        <div>
          <div style="font-size:13px; font-weight:600; color:#FAF7F1;">Rachel Moore</div>
          <div style="font-size:11.5px; color:#8FA1B2;">Office Admin</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div style="flex:1; padding:36px 44px 60px; min-width:0;">
    <div style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:28px; gap:24px; flex-wrap:wrap;">
      <div>
        <div style="font-family:'Lora',serif; font-weight:600; font-size:30px; color:#1A3A5C;">Members</div>
        <div style="font-size:14.5px; color:#5B7185; margin-top:4px;">{{ memberCountLabel }}</div>
      </div>
      <div style="width:34px; height:34px; border-radius:50%; background:#EFEAE0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#8A7A57; border:1px solid #E1D8C6;">Staff only</div>
    </div>

    <div style="display:flex; align-items:center; gap:14px; margin-bottom:28px; flex-wrap:wrap;">
      <div style="flex:1; min-width:260px; max-width:440px; display:flex; align-items:center; gap:10px; background:#fff; border:1px solid #E5DCC8; border-radius:10px; padding:11px 16px; box-shadow:0 1px 2px rgba(26,58,92,0.04);">
        <div style="width:16px; height:16px; border:2px solid #97A9B8; border-radius:50%; flex-shrink:0; position:relative;">
          <div style="position:absolute; width:2px; height:8px; background:#97A9B8; transform:rotate(45deg); right:-6px; bottom:-4px;"></div>
        </div>
        <input placeholder="Search by name, email, or phone" value="{{ search }}" onChange="{{ onSearchChange }}" style="border:none; outline:none; font-size:14.5px; font-family:'Public Sans',sans-serif; color:#1A3A5C; width:100%; background:transparent;" />
      </div>

      <div style="display:flex; align-items:center; gap:8px;">
        <sc-for list="{{ filterChips }}" as="chip" hint-placeholder-count="4">
          <div onClick="{{ chip.onClick }}" style="{{ chip.style }}">{{ chip.label }}</div>
        </sc-for>
      </div>

      <select value="{{ campus }}" onChange="{{ onCampusChange }}" style="font-size:13px; font-weight:600; padding:9px 14px; border-radius:999px; cursor:pointer; border:1px solid #E5DCC8; background:#fff; color:#5B7185; font-family:'Public Sans',sans-serif; outline:none;">
        <option value="All Campuses">All Campuses</option>
        <option value="Arlington">Arlington</option>
        <option value="Leesburg">Leesburg</option>
      </select>

      <div style="margin-left:auto; display:flex; align-items:center; gap:8px; background:#1A3A5C; color:#FAF7F1; font-size:14px; font-weight:600; padding:11px 20px; border-radius:10px; cursor:pointer; white-space:nowrap;">
        <div style="width:14px; height:2px; background:#C8973A; position:relative;">
          <div style="position:absolute; width:2px; height:14px; background:#C8973A; left:6px; top:-6px;"></div>
        </div>
        Add Member
      </div>
    </div>

    <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:18px;">
      <sc-for list="{{ visibleMembers }}" as="m" hint-placeholder-count="9">
        <div style="background:#fff; border:1px solid #EAE2D0; border-radius:14px; padding:20px; display:flex; flex-direction:column; gap:14px; box-shadow:0 1px 3px rgba(26,58,92,0.05); transition:box-shadow 0.15s;">
          <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:10px;">
            <div style="display:flex; align-items:center; gap:12px; min-width:0;">
              <div style="width:46px; height:46px; border-radius:50%; background:{{ m.avatarBg }}; display:flex; align-items:center; justify-content:center; font-family:'Lora',serif; font-weight:600; font-size:16px; color:{{ m.avatarColor }}; flex-shrink:0;">{{ m.initials }}</div>
              <div style="min-width:0;">
                <div style="font-family:'Lora',serif; font-weight:600; font-size:17px; color:#1A3A5C; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ m.name }}</div>
                <div style="font-size:12.5px; color:#8A94A0; margin-top:2px;">{{ m.household }} · {{ m.campus }}</div>
              </div>
            </div>
            <div style="{{ m.badgeStyle }}">{{ m.status }}</div>
          </div>

          <div style="height:1px; background:#F0EBDF;"></div>

          <div style="display:flex; flex-direction:column; gap:8px;">
            <div style="display:flex; align-items:center; gap:9px; font-size:13.5px; color:#3E5670;">
              <div style="width:15px; height:11px; border:1.5px solid #97A9B8; border-radius:2px; flex-shrink:0;"></div>
              <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">{{ m.email }}</div>
            </div>
            <div style="display:flex; align-items:center; gap:9px; font-size:13.5px; color:#3E5670;">
              <div style="width:11px; height:15px; border:1.5px solid #97A9B8; border-radius:3px; flex-shrink:0;"></div>
              <div>{{ m.phone }}</div>
            </div>
          </div>
        </div>
      </sc-for>
    </div>

    <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
      <div style="text-align:center; padding:60px 0; color:#8A94A0; font-size:14.5px;">No members match "{{ search }}".</div>
    </sc-if>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
const NAV = [
  { label: 'Members', active: true },
  { label: 'Families & Households', active: false },
];

const MEMBERS = [
  { name: 'Margaret Whitfield', household: 'Whitfield Family', email: 'margaret.whitfield@gracechapel.org', phone: '(614) 555-0142', status: 'Member', campus: 'Arlington' },
  { name: 'Daniel Okafor', household: 'Okafor Household', email: 'd.okafor@gracechapel.org', phone: '(614) 555-0198', status: 'Member', campus: 'Leesburg' },
  { name: 'Priya Anand', household: 'Anand Family', email: 'priya.anand@gmail.com', phone: '(614) 555-0173', status: 'Regular Attendee', campus: 'Arlington' },
  { name: 'Thomas Reyes', household: 'Reyes Household', email: 'treyes88@outlook.com', phone: '(614) 555-0110', status: 'Visitor', campus: 'Leesburg' },
  { name: 'Evelyn Carter', household: 'Carter Family', email: 'evelyn.carter@gracechapel.org', phone: '(614) 555-0161', status: 'Member', campus: 'Arlington' },
  { name: 'James Sutton', household: 'Sutton Household', email: 'j.sutton@yahoo.com', phone: '(614) 555-0129', status: 'Regular Attendee', campus: 'Leesburg' },
  { name: 'Ana Morales', household: 'Morales Family', email: 'ana.morales@gmail.com', phone: '(614) 555-0184', status: 'Visitor', campus: 'Arlington' },
  { name: 'Harold Bishop', household: 'Bishop Household', email: 'h.bishop@gracechapel.org', phone: '(614) 555-0155', status: 'Member', campus: 'Leesburg' },
  { name: 'Naomi Fields', household: 'Fields Family', email: 'naomi.fields@gmail.com', phone: '(614) 555-0137', status: 'Regular Attendee', campus: 'Arlington' },
];

const STATUS_STYLE = {
  'Member': { bg: '#EAF1E9', color: '#3F6B45' },
  'Regular Attendee': { bg: '#FDF1DC', color: '#8A6A24' },
  'Visitor': { bg: '#EEF2F6', color: '#4C6178' },
};

const AVATAR_COLORS = [
  { bg: '#EFE2C8', color: '#8A6A24' },
  { bg: '#DCE6EE', color: '#2E4E6E' },
  { bg: '#E9E2F0', color: '#5B4A80' },
  { bg: '#E6EEE1', color: '#3F6B45' },
];

function initialsOf(name) {
  return name.split(' ').filter(Boolean).slice(0, 2).map(p => p[0]).join('').toUpperCase();
}

class Component extends DCLogic {
  state = {
    search: '',
    filter: 'All',
    campus: 'All Campuses',
  };

  onSearchChange = (e) => this.setState({ search: e.target.value });
  setFilter = (f) => this.setState({ filter: f });
  onCampusChange = (e) => this.setState({ campus: e.target.value });

  renderVals() {
    const search = this.state.search.trim().toLowerCase();
    const filter = this.state.filter;
    const campus = this.state.campus;

    const filtered = MEMBERS.filter(m => {
      const matchesFilter = filter === 'All' || m.status === filter;
      const matchesCampus = campus === 'All Campuses' || m.campus === campus;
      const matchesSearch = !search || [m.name, m.email, m.phone].some(v => v.toLowerCase().includes(search));
      return matchesFilter && matchesCampus && matchesSearch;
    });

    const visibleMembers = filtered.map((m, i) => {
      const av = AVATAR_COLORS[i % AVATAR_COLORS.length];
      const st = STATUS_STYLE[m.status];
      return {
        ...m,
        initials: initialsOf(m.name),
        avatarBg: av.bg,
        avatarColor: av.color,
        badgeStyle: `font-size:12px; font-weight:600; padding:4px 11px; border-radius:999px; white-space:nowrap; background:${st.bg}; color:${st.color};`,
      };
    });

    const navItems = NAV.map(n => ({
      label: n.label,
      weight: n.active ? 700 : 500,
      iconColor: n.active ? '#C8973A' : '#7C8FA0',
      iconRadius: n.active ? '4px' : '50%',
      style: `display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:9px; margin-bottom:2px; cursor:pointer; color:${n.active ? '#FAF7F1' : '#B7C3CF'}; background:${n.active ? 'rgba(200,151,58,0.16)' : 'transparent'};`,
    }));

    const statusOptions = ['All', 'Member', 'Regular Attendee', 'Visitor'];
    const filterChips = statusOptions.map(s => ({
      label: s,
      onClick: () => this.setFilter(s),
      style: `font-size:13px; font-weight:600; padding:8px 14px; border-radius:999px; cursor:pointer; white-space:nowrap; border:1px solid ${filter === s ? '#1A3A5C' : '#E5DCC8'}; background:${filter === s ? '#1A3A5C' : '#fff'}; color:${filter === s ? '#FAF7F1' : '#5B7185'};`,
    }));

    return {
      navItems,
      search: this.state.search,
      onSearchChange: this.onSearchChange,
      campus: this.state.campus,
      onCampusChange: this.onCampusChange,
      filterChips,
      visibleMembers,
      noResults: visibleMembers.length === 0,
      memberCountLabel: `${filtered.length} of ${MEMBERS.length} members`,
    };
  }
}

</script>
</body>
</html>
